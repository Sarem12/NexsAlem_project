<!DOCTYPE html>
<html>
<head>
    <title>Mental Health - Nex Alem</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body{background:#f0f8ff;}
        .sidebar,.main{background:#ffffff;}
        .banner{font-size:32px;font-weight:900;color:#4B0082;text-transform:uppercase;text-align:center;margin:12px 0;}
        .status{border:1px solid #ddd;border-radius:8px;padding:10px;margin:10px 0;}
        .status h3{margin:0;color:#4B0082;}
    </style>
</head>
<body>
<div class="sidebar">
    <h2>NEXALEM</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="grades.html">Grades</a>
    <a href="timetable.html">Timetable</a>
    <a href="messages.html">Messages</a>
    <a href="study-groups.html">Study Groups</a>
    <a href="mental-health.html">Mental Health</a>
    <a href="curriculum.html">Curriculum</a>
</div>
<div class="main">
    <div class="banner">NEXALEM</div>
    <div class="topbar"><h1>Mental Health</h1></div>
    <div id="healthStatus" class="status"></div>
</div>
<script>
const metrics=[
    {label:'Stress', value:'Low', color:'#32cd32'},
    {label:'Focus', value:'Good', color:'#1e90ff'},
    {label:'Sleep', value:'7h', color:'#8a2be2'}
];
function renderStatus(){
    const c=document.getElementById('healthStatus');
    c.innerHTML=metrics.map(m=>`<p><strong>${m.label}</strong>: <span style='color:${m.color};'>${m.value}</span></p>`).join('');
}
function updateRandom(){
    metrics[0].value=['Low','Medium','High'][Math.floor(Math.random()*3)];
    metrics[1].value=['Poor','Fair','Good'][Math.floor(Math.random()*3)];
    metrics[2].value=`${6+Math.floor(Math.random()*3)}h`;
    renderStatus();
}
renderStatus();
setInterval(updateRandom,5000);
</script>
</body>
</html>
